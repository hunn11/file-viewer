<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文件预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        .preview-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f8f9fc; border-bottom: 1px solid #e8ecf0; flex-shrink: 0; }
        .header .title { font-size: 16px; font-weight: 600; color: #1a2332; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 12px; }
        .header .close-btn { padding: 6px 14px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; background: #e8ecf0; color: #1a2332; }
        .header .close-btn:hover { background: #d5dbe3; }
        .iframe-wrapper { flex: 1; background: #fff; position: relative; }
        .iframe-wrapper iframe { width: 100%; height: 100%; border: none; }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; background: #fff; z-index: 10; transition: opacity 0.5s; }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-overlay .spinner { width: 40px; height: 40px; border: 3px solid #e0e6ed; border-top-color: #2b7de9; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay .text { color: #909399; font-size: 14px; }
        .loading-overlay .progress { margin-top: 12px; color: #2b7de9; font-size: 13px; }
        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 90%; text-align: center; }
        .toast.show { opacity: 1; }
        .toast.error { background: rgba(255,107,107,0.9); }
        .toast.success { background: rgba(26,173,95,0.9); }
        .btn-download { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 20; padding: 12px 32px; background: #2b7de9; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 12px rgba(43,125,233,0.4); transition: all 0.3s; }
        .btn-download:hover { background: #1a6ad5; transform: translateX(-50%) scale(1.02); }
        .btn-download:disabled { opacity: 0.5; cursor: not-allowed; transform: translateX(-50%) scale(1); }
        .btn-download.hidden { display: none; }
        .status-bar { padding: 8px 16px; background: #f0f2f5; font-size: 13px; color: #606266; text-align: center; flex-shrink: 0; border-top: 1px solid #e8ecf0; }
        .status-bar .cached { color: #1aad5f; }
        .status-bar .downloading { color: #e6a23c; }
        .status-bar .error { color: #f56c6c; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    
    <div class="preview-container">
        <div class="header">
            <span class="title" id="fileName">文件加载中...</span>
            <button class="close-btn" id="closeBtn">✕ 关闭</button>
        </div>
        <div class="iframe-wrapper" id="iframeWrapper">
            <!-- 加载遮罩 -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="text" id="loadingText">正在加载文件...</div>
                <div class="progress" id="progressText"></div>
            </div>
            <!-- PDF iframe -->
            <iframe id="pdfIframe"></iframe>
            <!-- 下载按钮 -->
            <button class="btn-download" id="downloadBtn">📥 下载文件</button>
        </div>
        <div class="status-bar" id="statusBar">💡 点击下载按钮开始</div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            CACHE_KEY: 'cached_pdf_data',
            CACHE_META_KEY: 'cached_pdf_meta',
            BASE_URL: 'https://xglwx.siglenlift.cn/testfile',
        };

        // ==================== 获取参数 ====================
        const urlParams = new URLSearchParams(window.location.search);
        const FILE_PATH = urlParams.get('url') || '';
        const FILE_NAME = urlParams.get('name') || '未知文件';
        const TOKEN = urlParams.get('token') || '';

        const FILE_URL = CONFIG.BASE_URL + FILE_PATH;

        console.log('📁 文件路径:', FILE_PATH);
        console.log('🌐 完整URL:', FILE_URL);
        console.log('🔑 Token:', TOKEN ? '有' : '无');

        // ==================== DOM 引用 ====================
        const fileNameEl = document.getElementById('fileName');
        const pdfIframe = document.getElementById('pdfIframe');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const progressText = document.getElementById('progressText');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusBar = document.getElementById('statusBar');
        const closeBtn = document.getElementById('closeBtn');
        const toast = document.getElementById('toast');

        // ==================== 状态 ====================
        let currentBlobUrl = null;
        let isDownloading = false;
        let isCached = false;

        // ==================== Toast ====================
        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            void toast.offsetWidth;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ==================== 状态栏 ====================
        function setStatus(text, type = 'info') {
            statusBar.innerHTML = text;
            statusBar.className = 'status-bar ' + type;
        }

        // ==================== 加载遮罩 ====================
        function showLoading(show, text = '加载中...', progress = '') {
            if (show) {
                loadingOverlay.classList.remove('hidden');
                loadingText.textContent = text;
                progressText.textContent = progress;
            } else {
                loadingOverlay.classList.add('hidden');
            }
        }

        // ==================== 缓存操作 ====================

        function saveToCache(blob, fileName) {
            try {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const cacheData = {
                        data: e.target.result,
                        fileName: fileName,
                        timestamp: Date.now(),
                        url: FILE_URL
                    };
                    localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify(cacheData));
                    console.log('💾 已缓存到 localStorage');
                };
                reader.readAsDataURL(blob);
            } catch (err) {
                console.warn('缓存失败:', err);
            }
        }

        function getFromCache() {
            try {
                const cached = localStorage.getItem(CONFIG.CACHE_KEY);
                if (!cached) return null;
                const data = JSON.parse(cached);
                if (data.url !== FILE_URL) {
                    console.log('📝 文件不同，重新下载');
                    return null;
                }
                const age = Date.now() - data.timestamp;
                const maxAge = 7 * 24 * 60 * 60 * 1000;
                if (age > maxAge) {
                    console.log('⏰ 缓存已过期');
                    localStorage.removeItem(CONFIG.CACHE_KEY);
                    return null;
                }
                return data;
            } catch (err) {
                console.warn('读取缓存失败:', err);
                return null;
            }
        }

        function loadFromCache(cacheData) {
            try {
                const arr = cacheData.data.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) {
                    u8arr[n] = bstr.charCodeAt(n);
                }
                const blob = new Blob([u8arr], { type: mime });
                return blob;
            } catch (err) {
                console.error('缓存加载失败:', err);
                return null;
            }
        }

        // ==================== 核心：下载文件 ====================

        function downloadFile() {
            if (isDownloading) return;
            if (!FILE_URL) {
                setStatus('❌ 文件地址无效', 'error');
                return;
            }

            isDownloading = true;
            downloadBtn.disabled = true;
            downloadBtn.textContent = '⏳ 下载中...';
            showLoading(true, '正在下载文件...', '0%');
            setStatus('⏳ 下载中...', 'downloading');

            const headers = {};
            if (TOKEN) {
                headers['Authorization'] = `Bearer ${TOKEN}`;
            }

            // 使用 fetch 下载，带进度
            fetch(FILE_URL, { headers })
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`请求失败 (${res.status})`);
                    }
                    const contentLength = res.headers.get('content-length');
                    const total = parseInt(contentLength, 10);
                    let loaded = 0;

                    // 读取流以显示进度
                    const reader = res.body.getReader();
                    const chunks = [];

                    return new ReadableStream({
                        start(controller) {
                            function push() {
                                reader.read().then(({ done, value }) => {
                                    if (done) {
                                        controller.close();
                                        return;
                                    }
                                    chunks.push(value);
                                    loaded += value.length;
                                    if (total) {
                                        const percent = Math.round((loaded / total) * 100);
                                        progressText.textContent = percent + '%';
                                    }
                                    controller.enqueue(value);
                                    push();
                                });
                            }
                            push();
                        }
                    }).pipeThrough(new TransformStream({
                        transform(chunk, controller) {
                            controller.enqueue(chunk);
                        }
                    }));
                })
                .then(stream => new Response(stream).blob())
                .then(blob => {
                    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                    currentBlobUrl = URL.createObjectURL(blob);

                    // 保存到缓存
                    saveToCache(blob, FILE_NAME);
                    isCached = true;

                    showLoading(false);
                    downloadBtn.textContent = '📥 重新下载';
                    downloadBtn.disabled = false;
                    setStatus('✅ 下载完成，自动打开预览', 'cached');
                    showToast('✅ 下载完成', 'success');

                    // ✅ 自动预览
                    previewFile(blob);
                })
                .catch(err => {
                    showLoading(false);
                    downloadBtn.textContent = '📥 重新下载';
                    downloadBtn.disabled = false;
                    setStatus('❌ 下载失败: ' + err.message, 'error');
                    showToast('❌ 下载失败', 'error');
                })
                .finally(() => {
                    isDownloading = false;
                });
        }

        // ==================== 预览 ====================

        function previewFile(blob) {
            const ext = FILE_NAME.split('.').pop().toLowerCase();
            
            if (ext === 'pdf') {
                // 使用 blob URL 预览 PDF
                const blobUrl = URL.createObjectURL(blob);
                pdfIframe.src = blobUrl;
            } else if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                const blobUrl = URL.createObjectURL(blob);
                const img = document.createElement('img');
                img.src = blobUrl;
                img.style.cssText = 'width:100%;height:100%;object-fit:contain;';
                const wrapper = document.getElementById('iframeWrapper');
                wrapper.insertBefore(img, pdfIframe);
                pdfIframe.style.display = 'none';
            } else {
                // 其他类型直接下载
                downloadBlob(blob);
                return;
            }
        }

        // ==================== 下载当前文件 ====================

        function downloadBlob(blob) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = FILE_NAME;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast('📥 下载已开始', 'success');
        }

        // ==================== 检查缓存并初始化 ====================

        function init() {
            fileNameEl.textContent = FILE_NAME;

            // ✅ 检查缓存
            const cached = getFromCache();
            if (cached) {
                const blob = loadFromCache(cached);
                if (blob) {
                    console.log('📦 从缓存加载');
                    currentBlobUrl = URL.createObjectURL(blob);
                    isCached = true;
                    setStatus('📦 从缓存加载，自动预览', 'cached');
                    showLoading(false);
                    downloadBtn.textContent = '📥 重新下载';
                    // ✅ 自动预览
                    previewFile(blob);
                    return;
                }
            }

            // 无缓存，显示下载按钮
            showLoading(false);
            setStatus('💡 点击下方 "下载文件" 按钮', 'info');
            downloadBtn.textContent = '📥 下载文件';
            downloadBtn.disabled = false;
        }

        // ==================== 事件绑定 ====================

        downloadBtn.addEventListener('click', function() {
            // 如果有缓存且已预览，点击重新下载
            if (isCached && currentBlobUrl) {
                downloadFile();
            } else {
                downloadFile();
            }
        });

        closeBtn.addEventListener('click', function() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.close();
            }
        });

        // ==================== 启动 ====================
        init();
    </script>
</body>
</html>
