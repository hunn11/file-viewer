<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文件预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 16px;
        }

        .file-icon {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            background: #e8f4fd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 16px;
        }

        .file-name {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #1a2332;
            word-break: break-all;
            margin-bottom: 8px;
        }

        .file-size {
            text-align: center;
            font-size: 14px;
            color: #8c9aa8;
            margin-bottom: 20px;
        }

        .status-tip {
            text-align: center;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            background: #f0f7ff;
            color: #2b7de9;
        }

        .status-tip.cached {
            background: #e8f8ee;
            color: #1aad5f;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background: #2b7de9;
            color: white;
        }

        .btn-primary:active {
            background: #1a6ad4;
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            background: #a0b8d0;
            cursor: not-allowed;
        }

        .btn-success {
            background: #1aad5f;
            color: white;
        }

        .btn-success:active {
            background: #15954f;
        }

        .btn-outline {
            background: white;
            color: #2b7de9;
            border: 1.5px solid #2b7de9;
        }

        .btn-outline:active {
            background: #f0f7ff;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:active {
            background: #e55a5a;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 12px;
            color: #8c9aa8;
            font-size: 14px;
        }

        .loading.active {
            display: block;
        }

        .loading .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e0e6ed;
            border-top-color: #2b7de9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e8ecf0;
            border-radius: 4px;
            overflow: hidden;
            margin: 12px 0;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-bar .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2b7de9, #1aad5f);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f2f5;
            font-size: 14px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #8c9aa8;
        }

        .info-value {
            color: #1a2332;
            font-weight: 500;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }

        .toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            background: rgba(26, 173, 95, 0.9);
        }

        .toast.error {
            background: rgba(255, 107, 107, 0.9);
        }

        /* 预览覆盖层 */
        .preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: #fff;
            display: none;
            flex-direction: column;
        }

        .preview-overlay.active {
            display: flex;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fc;
            border-bottom: 1px solid #e8ecf0;
            flex-shrink: 0;
        }

        .preview-header .title {
            font-size: 16px;
            font-weight: 600;
            color: #1a2332;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            margin-right: 12px;
        }

        .preview-header .close-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            background: #e8ecf0;
            color: #1a2332;
        }

        .preview-header .close-btn:active {
            background: #d0d4d8;
        }

        .preview-body {
            flex: 1;
            overflow: auto;
            background: #fff;
        }

        .preview-body iframe,
        .preview-body img,
        .preview-body .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .download-btn-inline {
            padding: 12px 24px;
            background: #2b7de9;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            margin: 8px 16px;
            flex-shrink: 0;
        }

        .download-btn-inline:active {
            background: #1a6ad4;
        }

        .preview-footer {
            display: flex;
            justify-content: center;
            padding: 8px 16px 16px;
            background: #f8f9fc;
            flex-shrink: 0;
            gap: 12px;
        }

        /* PDF 使用 pdf.js 或浏览器原生 */
        .pdf-viewer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

    <div id="toast" class="toast"></div>

    <!-- 预览覆盖层 -->
    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-header">
            <span class="title" id="previewTitle">文件预览</span>
            <button class="close-btn" id="closePreview">✕ 关闭</button>
        </div>
        <div class="preview-body" id="previewBody">
            <!-- 动态加载内容 -->
        </div>
        <div class="preview-footer">
            <button class="download-btn-inline" id="downloadInlineBtn">📥 下载文件</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="file-icon">📄</div>
            <div class="file-name" id="fileName">文件名称</div>
            <div class="file-size" id="fileSize">文件大小未知</div>

            <div class="status-tip" id="statusTip">⏳ 点击下方按钮下载或预览</div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="loading" id="loading">
                <span class="spinner"></span>
                <span id="loadingText">加载中...</span>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="mainBtn">📥 下载文件</button>
                <button class="btn btn-outline" id="cacheBtn" style="display:none;">🗑️ 清除缓存</button>
            </div>
        </div>

        <div class="card">
            <div class="info-row">
                <span class="info-label">文件名</span>
                <span class="info-value" id="infoName">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">文件大小</span>
                <span class="info-value" id="infoSize">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">缓存状态</span>
                <span class="info-value" id="infoCacheStatus">未缓存</span>
            </div>
            <div class="info-row">
                <span class="info-label">文件链接</span>
                <span class="info-value" id="infoUrl"
                    style="font-size:12px;font-weight:400;color:#8c9aa8;word-break:break-all;">-</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置区
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const FILE_URL = urlParams.get('url') || '';
        const FILE_NAME = urlParams.get('name') || '未知文件';
        const FILE_SIZE = parseInt(urlParams.get('size')) || 0;
        console.log("FILE_URL", FILE_URL, FILE_NAME);

        let cachedFilePath = null;
        let isFileCached = false;
        let isDownloading = false;

        // 存储当前 blob URL 用于下载
        let currentBlobUrl = null;

        // DOM 引用
        const $ = (id) => document.getElementById(id);
        const fileNameEl = $('fileName');
        const fileSizeEl = $('fileSize');
        const statusTip = $('statusTip');
        const progressBar = $('progressBar');
        const progressFill = $('progressFill');
        const loading = $('loading');
        const loadingText = $('loadingText');
        const mainBtn = $('mainBtn');
        const cacheBtn = $('cacheBtn');
        const infoName = $('infoName');
        const infoSize = $('infoSize');
        const infoCacheStatus = $('infoCacheStatus');
        const infoUrl = $('infoUrl');
        const toast = $('toast');

        // 预览覆盖层
        const previewOverlay = $('previewOverlay');
        const previewBody = $('previewBody');
        const previewTitle = $('previewTitle');
        const closePreview = $('closePreview');
        const downloadInlineBtn = $('downloadInlineBtn');

        // ============================================================
        // 工具函数
        // ============================================================
        function formatSize(bytes) {
            if (!bytes || bytes === 0) return '未知大小';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0;
            while (bytes >= 1024 && i < units.length - 1) {
                bytes /= 1024;
                i++;
            }
            return bytes.toFixed(i === 0 ? 0 : 1) + ' ' + units[i];
        }

        function showToast(message, type = 'info', duration = 2500) {
            toast.textContent = message;
            toast.className = 'toast ' + type;
            void toast.offsetWidth;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        function updateUI() {
            fileNameEl.textContent = FILE_NAME || '未知文件';
            infoName.textContent = FILE_NAME || '-';
            const sizeText = formatSize(FILE_SIZE);
            fileSizeEl.textContent = sizeText;
            infoSize.textContent = sizeText;
            infoUrl.textContent = FILE_URL ? FILE_URL.substring(0, 80) + (FILE_URL.length > 80 ? '...' : '') : '-';

            if (isFileCached) {
                statusTip.textContent = '✅ 文件已缓存，可直接打开';
                statusTip.className = 'status-tip cached';
                infoCacheStatus.textContent = '✅ 已缓存';
                mainBtn.textContent = '📂 打开文件';
                mainBtn.className = 'btn btn-success';
                cacheBtn.style.display = 'block';
            } else {
                statusTip.textContent = '📥 点击下载文件';
                statusTip.className = 'status-tip';
                infoCacheStatus.textContent = '⏳ 未缓存';
                mainBtn.textContent = '📥 下载文件';
                mainBtn.className = 'btn btn-primary';
                cacheBtn.style.display = 'none';
            }
        }

        function resetUI() {
            isDownloading = false;
            mainBtn.disabled = false;
            loading.classList.remove('active');
            progressBar.classList.remove('active');
            progressFill.style.width = '0%';
            updateUI();
        }

        // ============================================================
        // 核心：下载并预览文件
        // ============================================================
        function downloadFile() {
            if (isDownloading) {
                showToast('正在下载中，请稍候...', 'info');
                return;
            }

            if (!FILE_URL) {
                showToast('文件链接无效', 'error');
                return;
            }

            isDownloading = true;
            mainBtn.disabled = true;
            mainBtn.textContent = '⏳ 下载中...';
            loading.classList.add('active');
            loadingText.textContent = '正在下载文件...';
            progressBar.classList.add('active');
            progressFill.style.width = '10%';
            statusTip.textContent = '⏳ 正在下载，请稍候...';
            statusTip.className = 'status-tip';

            // 显示进度模拟
            let progress = 10;
            const progressInterval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 8 + 2;
                    progress = Math.min(progress, 90);
                    progressFill.style.width = progress + '%';
                    loadingText.textContent = `下载中 ${Math.round(progress)}%`;
                }
            }, 300);
            const BASE_URL = 'https://192.168.0.34:5101/'; 
            const FILE_URL = BASE_URL + (urlParams.get('url') || '');

            console.log('最终请求URL:', FILE_URL);

            fetch(FILE_URL, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
                .then(res => {
                    if (!res.ok) throw new Error('网络请求失败: ' + res.status);
                    const contentLength = res.headers.get('content-length');
                    if (contentLength) {
                        // 如果有 content-length，可以更精确
                    }
                    return res.blob();
                })
                .then(blob => {
                    clearInterval(progressInterval);
                    progressFill.style.width = '100%';
                    loadingText.textContent = '下载完成，准备预览...';

                    // 创建 blob URL
                    if (currentBlobUrl) {
                        URL.revokeObjectURL(currentBlobUrl);
                    }
                    currentBlobUrl = URL.createObjectURL(blob);

                    // 判断文件类型
                    const fileType = FILE_NAME.split('.').pop().toLowerCase();
                    const previewTypes = ['pdf', 'jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx'];

                    // 更新缓存状态（模拟）
                    isFileCached = true;
                    cachedFilePath = FILE_URL;

                    // 关闭加载状态
                    resetUI();
                    showToast('文件加载完成', 'success');

                    // 打开预览
                    openPreview(blob, fileType);
                })
                .catch(err => {
                    clearInterval(progressInterval);
                    console.error('下载失败:', err);
                    resetUI();
                    showToast('下载失败: ' + err.message, 'error');
                });
        }

        // ============================================================
        // 打开预览
        // ============================================================
        function openPreview(blob, fileType) {
            previewTitle.textContent = FILE_NAME || '文件预览';
            previewBody.innerHTML = '';

            const isImage = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'].includes(fileType);
            const isPDF = fileType === 'pdf';

            if (isImage) {
                // 图片预览
                const img = document.createElement('img');
                img.src = currentBlobUrl;
                img.style.cssText = 'width:100%;height:100%;object-fit:contain;';
                previewBody.appendChild(img);
            } else if (isPDF) {
                // PDF 预览 - 使用 iframe
                const iframe = document.createElement('iframe');
                iframe.src = currentBlobUrl;
                iframe.style.cssText = 'width:100%;height:100%;border:none;';
                iframe.setAttribute('allowfullscreen', 'true');
                previewBody.appendChild(iframe);
            } else {
                // 其他文件类型：显示信息 + 下载按钮
                const div = document.createElement('div');
                div.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px;text-align:center;';
                div.innerHTML = `
                    <div style="font-size:48px;margin-bottom:20px;">📄</div>
                    <div style="font-size:18px;font-weight:600;color:#1a2332;margin-bottom:8px;">${FILE_NAME}</div>
                    <div style="font-size:14px;color:#8c9aa8;margin-bottom:24px;">文件类型: ${fileType || '未知'}</div>
                    <div style="font-size:14px;color:#8c9aa8;margin-bottom:24px;">点击下方「下载文件」按钮保存到本地</div>
                `;
                previewBody.appendChild(div);
            }

            // 显示预览覆盖层
            previewOverlay.classList.add('active');
        }

        // ============================================================
        // 下载当前预览的文件
        // ============================================================
        function downloadCurrentFile() {
            if (!currentBlobUrl) {
                showToast('没有可下载的文件', 'error');
                return;
            }
            const a = document.createElement('a');
            a.href = currentBlobUrl;
            a.download = FILE_NAME;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast('下载已开始', 'success');
        }

        // ============================================================
        // 打开已缓存文件
        // ============================================================
        function openFile() {
            if (!isFileCached) {
                showToast('文件尚未缓存，请先下载', 'error');
                return;
            }
            if (currentBlobUrl) {
                previewOverlay.classList.add('active');
                return;
            }
            // 如果没有 blob URL，重新下载
            downloadFile();
        }

        // ============================================================
        // 清除缓存
        // ============================================================
        function clearCache() {
            if (!isFileCached) {
                showToast('没有缓存可清除', 'info');
                return;
            }
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
            isFileCached = false;
            cachedFilePath = null;
            const cacheKey = 'file_cached_' + encodeURIComponent(FILE_URL);
            localStorage.removeItem(cacheKey);
            updateUI();
            showToast('缓存已清除', 'success');
        }

        // ============================================================
        // 事件绑定
        // ============================================================
        mainBtn.addEventListener('click', function () {
            if (isFileCached) {
                openFile();
            } else {
                downloadFile();
            }
        });

        cacheBtn.addEventListener('click', clearCache);

        closePreview.addEventListener('click', function () {
            previewOverlay.classList.remove('active');
        });

        downloadInlineBtn.addEventListener('click', downloadCurrentFile);

        // ============================================================
        // 初始化
        // ============================================================
        async function init() {
            // 检查缓存状态（使用 localStorage 模拟）
            const cacheKey = 'file_cached_' + encodeURIComponent(FILE_URL);
            const cached = localStorage.getItem(cacheKey);
            if (cached === 'true') {
                isFileCached = true;
            }

            updateUI();

            if (!FILE_URL) {
                mainBtn.disabled = true;
                mainBtn.textContent = '❌ 文件链接无效';
                statusTip.textContent = '⚠️ 文件链接缺失，请联系管理员';
                statusTip.className = 'status-tip';
                showToast('文件链接无效', 'error');
            } else {
                showToast('页面加载完成', 'info', 1500);
            }
        }

        if (document.readyState === 'complete') {
            init();
        } else {
            window.addEventListener('load', init);
        }
    </script>
</body>

</html>
