<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文件预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 500px; width: 100%; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 40px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
        .file-icon { width: 80px; height: 80px; border-radius: 50%; background: #e8f4fd; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 16px; }
        .file-name { font-size: 18px; font-weight: 600; color: #1a2332; word-break: break-all; margin-bottom: 8px; }
        .file-size { font-size: 14px; color: #8c9aa8; margin-bottom: 20px; }
        .status-tip { padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; background: #f0f2f5; color: #606266; }
        .status-tip.loading { background: #fff3e0; color: #e6a23c; }
        .status-tip.success { background: #e8f8ee; color: #1aad5f; }
        .status-tip.error { background: #fef0f0; color: #f56c6c; }
        .status-tip.cached { background: #e8f4fd; color: #2b7de9; }
        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #2b7de9; color: white; }
        .btn-primary:hover { background: #1a6ad5; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-success { background: #1aad5f; color: white; }
        .btn-success:hover { background: #159a52; }
        .loading { display: none; text-align: center; padding: 12px; color: #8c9aa8; font-size: 14px; }
        .loading.active { display: block; }
        .loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e0e6ed; border-top-color: #2b7de9; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 90%; text-align: center; }
        .toast.show { opacity: 1; }
        .toast.success { background: rgba(26,173,95,0.9); }
        .toast.error { background: rgba(255,107,107,0.9); }
        .preview-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #fff; display: none; flex-direction: column; }
        .preview-overlay.active { display: flex; }
        .preview-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f8f9fc; border-bottom: 1px solid #e8ecf0; flex-shrink: 0; }
        .preview-header .title { font-size: 16px; font-weight: 600; color: #1a2332; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 12px; }
        .preview-header .close-btn { padding: 6px 14px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; background: #e8ecf0; color: #1a2332; }
        .preview-header .close-btn:hover { background: #d5dbe3; }
        .preview-body { flex: 1; overflow: auto; background: #fff; min-height: 300px; -webkit-overflow-scrolling: touch; }
        .preview-body img, .preview-body iframe { width: 100%; height: 100%; border: none; display: block; }
        .preview-body iframe { width: 100%; height: 100%; min-height: 100vh; border: none; display: block; overflow: auto !important; -webkit-overflow-scrolling: touch !important; }
        .preview-body .placeholder { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 48px; color: #dcdfe6; flex-direction: column; }
        .preview-body .placeholder span { font-size: 16px; color: #909399; margin-top: 12px; }
        .preview-footer { display: flex; justify-content: center; padding: 12px 16px; background: #f8f9fc; border-top: 1px solid #e8ecf0; flex-shrink: 0; gap: 12px; }
        .preview-footer .btn { width: auto; padding: 10px 24px; margin: 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    
    <!-- 预览弹窗 -->
    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-header">
            <span class="title" id="previewTitle">文件预览</span>
            <button class="close-btn" id="closePreview">✕ 关闭</button>
        </div>
        <div class="preview-body" id="previewBody">
            <div class="placeholder">
                📄
                <span>加载中...</span>
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="container">
        <div class="card">
            <div class="file-icon">📄</div>
            <div class="file-name" id="fileName">文件名称</div>
            <div class="status-tip" id="statusTip">⏳ 准备加载...</div>
            <div class="loading" id="loading"><span class="spinner"></span><span id="loadingText">加载中...</span></div>
            <button class="btn btn-primary hidden" id="retryBtn">🔄 重新加载</button>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            BASE_URL: 'https://xglwx.siglenlift.cn/testfile',
            CACHE_KEY: 'cached_file_data',
        };

        // ==================== 获取参数 ====================
        const urlParams = new URLSearchParams(window.location.search);
        const FILE_PATH = urlParams.get('url') || '';
        const FILE_NAME = urlParams.get('name') || '未知文件';
        const TOKEN = urlParams.get('token') || '';

        const FILE_URL = CONFIG.BASE_URL + FILE_PATH;

        console.log('📁 文件路径:', FILE_PATH);
        console.log('🌐 完整URL:', FILE_URL);
        console.log('🔑 Token:', TOKEN ? '有' : '无');

        // ==================== DOM 引用 ====================
        const $ = (id) => document.getElementById(id);
        const fileNameEl = $('fileName');
        const statusTip = $('statusTip');
        const loading = $('loading');
        const loadingText = $('loadingText');
        const retryBtn = $('retryBtn');
        const toast = $('toast');
        const previewOverlay = $('previewOverlay');
        const previewBody = $('previewBody');
        const previewTitle = $('previewTitle');
        const closePreview = $('closePreview');

        // ==================== 状态 ====================
        let isDownloading = false;

        // ==================== 工具函数 ====================

        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            void toast.offsetWidth;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function setStatus(text, type = 'info') {
            statusTip.textContent = text;
            statusTip.className = 'status-tip ' + type;
        }

        function showLoading(show, text = '加载中...') {
            if (show) {
                loading.classList.add('active');
                loadingText.textContent = text;
            } else {
                loading.classList.remove('active');
            }
        }

        // ==================== 缓存操作（简化版 - 使用 localStorage） ====================

        function saveToCache(data) {
            try {
                const cacheData = {
                    data: data,
                    timestamp: Date.now(),
                    url: FILE_URL
                };
                localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify(cacheData));
                console.log('💾 已缓存到 localStorage');
            } catch (err) {
                console.warn('缓存失败:', err);
            }
        }

        function getFromCache() {
            try {
                const cached = localStorage.getItem(CONFIG.CACHE_KEY);
                if (!cached) return null;
                const data = JSON.parse(cached);
                if (data.url !== FILE_URL) {
                    console.log('📝 文件不同，重新下载');
                    return null;
                }
                const age = Date.now() - data.timestamp;
                const maxAge = 7 * 24 * 60 * 60 * 1000;
                if (age > maxAge) {
                    console.log('⏰ 缓存已过期');
                    localStorage.removeItem(CONFIG.CACHE_KEY);
                    return null;
                }
                return data;
            } catch (err) {
                console.warn('读取缓存失败:', err);
                return null;
            }
        }

        // ==================== 核心：直接加载（不使用 fetch，避免 CORS） ====================

        function loadPdfDirect() {
            // ✅ 直接用 iframe 加载 PDF（带 token 参数）
            let pdfUrl = FILE_URL;
            if (TOKEN) {
                const connector = FILE_URL.includes('?') ? '&' : '?';
                pdfUrl += connector + 'token=' + encodeURIComponent(TOKEN);
            }
            
            console.log('📄 直接加载 PDF:', pdfUrl);
            
            // 保存到缓存（仅保存 URL，不保存文件内容）
            saveToCache(pdfUrl);
            
            // 打开预览
            openPreviewDirect(pdfUrl);
        }

        // ==================== 预览（直接加载） ====================

        function openPreviewDirect(pdfUrl) {
            const ext = FILE_NAME.split('.').pop().toLowerCase();
            previewTitle.textContent = FILE_NAME;
            previewBody.innerHTML = '';

            if (ext === 'pdf') {
                const iframe = document.createElement('iframe');
                iframe.src = pdfUrl;
                iframe.style.cssText = 'width:100%;height:100%;border:none;';
                iframe.setAttribute('scrolling', 'yes');
                previewBody.appendChild(iframe);
                
                // 加载完成提示
                iframe.onload = function() {
                    showLoading(false);
                    setStatus('✅ 加载成功', 'success');
                    showToast('✅ 文件加载成功', 'success');
                };
                iframe.onerror = function() {
                    showLoading(false);
                    setStatus('❌ 加载失败', 'error');
                    showToast('❌ 加载失败，请重试', 'error');
                    retryBtn.classList.remove('hidden');
                };
            } else {
                previewBody.innerHTML = `
                    <div class="placeholder">
                        📄
                        <span>暂不支持预览 .${ext} 文件</span>
                        <span style="font-size:13px;color:#c0c4cc;margin-top:4px;">请下载查看</span>
                    </div>
                `;
            }

            previewOverlay.classList.add('active');
        }

        // ==================== 事件绑定 ====================

        closePreview.addEventListener('click', () => {
            previewOverlay.classList.remove('active');
        });

        previewOverlay.addEventListener('click', (e) => {
            if (e.target === previewOverlay) {
                previewOverlay.classList.remove('active');
            }
        });

        retryBtn.addEventListener('click', () => {
            retryBtn.classList.add('hidden');
            loadPdfDirect();
        });

        // ==================== 初始化 ====================

        function init() {
            fileNameEl.textContent = FILE_NAME;
            setStatus('⏳ 加载中...', 'loading');
            showLoading(true, '正在加载文件...');

            // ✅ 先检查缓存
            const cached = getFromCache();
            if (cached) {
                console.log('📦 发现缓存，直接打开');
                const cachedUrl = cached.data;
                showLoading(false);
                setStatus('📦 从缓存加载', 'cached');
                openPreviewDirect(cachedUrl);
                return;
            }

            // 无缓存，直接加载（使用 iframe + token 参数）
            console.log('📥 无缓存，直接加载');
            loadPdfDirect();
        }

        // 启动
        init();

        console.log('🚀 页面初始化完成');
    </script>
</body>
</html>
