<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件下载</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .file-icon { font-size: 48px; margin-bottom: 16px; }
    .file-name { 
      font-size: 16px; 
      font-weight: 600; 
      word-break: break-all;
      margin-bottom: 8px;
    }
    .file-size { color: #999; font-size: 14px; margin-bottom: 24px; }
    .btn-download {
      width: 100%;
      padding: 14px;
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .btn-preview {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #07c160;
      border: 2px solid #07c160;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .loading { display: none; margin-top: 16px; color: #999; }
    .loading.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="file-icon">📄</div>
    <div class="file-name" id="fileName">文件</div>
    <div class="file-size" id="fileSize">0 KB</div>
    
    <button class="btn-download" onclick="downloadFile()">下载到手机</button>
    <button class="btn-preview" onclick="previewFile()">预览文件</button>
    
    <div class="loading" id="loading">处理中...</div>
  </div>

<script>
  // 解析 URL 参数
  const params = new URLSearchParams(location.search);
  const fileUrl = decodeURIComponent(params.get('url') || '');
  const fileName = decodeURIComponent(params.get('name') || '文件');
  const token = params.get('token') || '';
  const fileSize = parseInt(params.get('size')) || 0;

  // 显示文件信息
  document.getElementById('fileName').textContent = fileName;
  document.getElementById('fileSize').textContent = formatSize(fileSize);

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function showLoading(show) {
    document.getElementById('loading').classList.toggle('show', show);
  }

  // 核心：下载 + 预览
  async function downloadAndPreview() {
    showLoading(true);
    
    try {
      const response = await fetch(fileUrl, {
        headers: {
          'Authorization': `Bearer ${token}`  // ✅ 带 token 请求
        }
      });
      
      if (!response.ok) throw new Error('下载失败');
      
      const blob = await response.blob();
      const blobUrl = URL.createObjectURL(blob);
      
      // ① 下载到本地
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = fileName;
      // ⚠️ 不要加 target="_blank"
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      
      // ② 立刻预览
      previewWithBlob(blobUrl, fileName);
      
      showLoading(false);
      alert('✅ 已下载并打开预览');
      
    } catch (err) {
      showLoading(false);
      alert('❌ 下载失败：' + err.message);
    }
  }

  // 下载按钮
  function downloadFile() {
    downloadAndPreview();
  }

  // 预览按钮
  function previewFile() {
    downloadAndPreview();
  }

  // 根据文件类型预览
  function previewWithBlob(blobUrl, name) {
    const ext = name.split('.').pop().toLowerCase();
    
    if (['pdf'].includes(ext)) {
      // PDF：embed 全屏预览
      const embed = document.createElement('embed');
      embed.src = blobUrl;
      embed.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#fff';
      document.body.appendChild(embed);
      setTimeout(() => embed.remove(), 10000);
      
    } else if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
      // 图片：img 全屏预览
      const img = document.createElement('img');
      img.src = blobUrl;
      img.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;object-fit:contain;z-index:9999;background:#000';
      document.body.appendChild(img);
      setTimeout(() => img.remove(), 5000);
      
    } else {
      // 其他：iframe 预览
      const iframe = document.createElement('iframe');
      iframe.src = blobUrl;
      iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;background:#fff';
      document.body.appendChild(iframe);
      setTimeout(() => iframe.remove(), 5000);
    }
  }
</script>
</body>
</html>
