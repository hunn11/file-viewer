<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文件预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        .preview-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f8f9fc; border-bottom: 1px solid #e8ecf0; flex-shrink: 0; }
        .header .title { font-size: 16px; font-weight: 600; color: #1a2332; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 12px; }
        .header .close-btn { padding: 6px 14px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; background: #e8ecf0; color: #1a2332; }
        .iframe-wrapper { flex: 1; background: #fff; }
        .iframe-wrapper iframe { width: 100%; height: 100%; border: none; }
        .loading { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; color: #909399; }
        .loading .spinner { width: 40px; height: 40px; border: 3px solid #e0e6ed; border-top-color: #2b7de9; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 90%; text-align: center; }
        .toast.show { opacity: 1; }
        .toast.error { background: rgba(255,107,107,0.9); }
        .toast.success { background: rgba(26,173,95,0.9); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    
    <div class="preview-container">
        <div class="header">
            <span class="title" id="fileName">文件加载中...</span>
            <button class="close-btn" id="closeBtn">✕ 关闭</button>
        </div>
        <div class="iframe-wrapper" id="iframeWrapper">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span id="loadingText">正在加载文件...</span>
            </div>
            <iframe id="pdfIframe" style="display:none;"></iframe>
        </div>
    </div>

    <script>
        // ==================== 获取参数 ====================
        const urlParams = new URLSearchParams(window.location.search);
        const FILE_PATH = urlParams.get('url') || '';
        const FILE_NAME = urlParams.get('name') || '未知文件';
        const TOKEN = urlParams.get('token') || '';

        // ✅ 修复：文件在 testfile 目录下
        const BASE_URL = 'https://xglwx.siglenlift.cn/testfile';
        const FILE_URL = BASE_URL + FILE_PATH;

        console.log('📁 文件路径:', FILE_PATH);
        console.log('🌐 完整URL:', FILE_URL);
        console.log('🔑 Token:', TOKEN ? '有' : '无');

        // ==================== DOM 引用 ====================
        const fileNameEl = document.getElementById('fileName');
        const pdfIframe = document.getElementById('pdfIframe');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const closeBtn = document.getElementById('closeBtn');
        const toast = document.getElementById('toast');

        // ==================== Toast ====================
        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            void toast.offsetWidth;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ==================== 加载 PDF ====================
        function loadPdf() {
            fileNameEl.textContent = FILE_NAME;
            loadingText.textContent = '正在加载文件...';

            // ✅ 通过 URL 参数传递 token
            let pdfUrl = FILE_URL;
            if (TOKEN) {
                const connector = FILE_URL.includes('?') ? '&' : '?';
                pdfUrl += connector + 'token=' + encodeURIComponent(TOKEN);
            }
            
            console.log('📄 加载 PDF URL:', pdfUrl);

            // 显示 iframe
            pdfIframe.style.display = 'block';
            pdfIframe.src = pdfUrl;

            // 监听加载完成
            pdfIframe.onload = function() {
                loading.style.display = 'none';
                console.log('✅ PDF 加载成功');
                showToast('✅ 加载成功', 'success');
            };

            pdfIframe.onerror = function() {
                loading.style.display = 'none';
                showToast('❌ PDF 加载失败', 'error');
                console.log('❌ PDF 加载失败');
            };

            // 超时处理（10秒后如果还没加载完成）
            setTimeout(() => {
                if (loading.style.display !== 'none') {
                    loading.style.display = 'none';
                    showToast('⏰ 加载超时', 'error');
                }
            }, 10000);
        }

        // ==================== 关闭 ====================
        closeBtn.addEventListener('click', function() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.close();
            }
        });

        // ==================== 启动 ====================
        loadPdf();
    </script>
</body>
</html>
