<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文件预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; padding: 20px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 30px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
        .file-icon { width: 72px; height: 72px; border-radius: 16px; background: #e8f4fd; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 16px; }
        .file-name { text-align: center; font-size: 18px; font-weight: 600; color: #1a2332; word-break: break-all; margin-bottom: 8px; }
        .file-size { text-align: center; font-size: 14px; color: #8c9aa8; margin-bottom: 20px; }
        .status-tip { text-align: center; padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .status-tip.cached { background: #e8f8ee; color: #1aad5f; }
        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: #2b7de9; color: white; }
        .btn-success { background: #1aad5f; color: white; }
        .loading { display: none; text-align: center; padding: 12px; color: #8c9aa8; font-size: 14px; }
        .loading.active { display: block; }
        .loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e0e6ed; border-top-color: #2b7de9; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 90%; text-align: center; }
        .toast.show { opacity: 1; }
        .toast.success { background: rgba(26,173,95,0.9); }
        .toast.error { background: rgba(255,107,107,0.9); }
        .preview-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #fff; display: none; flex-direction: column; }
        .preview-overlay.active { display: flex; }
        .preview-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f8f9fc; border-bottom: 1px solid #e8ecf0; }
        .preview-header .title { font-size: 16px; font-weight: 600; color: #1a2332; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 12px; }
        .preview-header .close-btn { padding: 6px 14px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; background: #e8ecf0; color: #1a2332; }
        .preview-body { flex: 1; overflow: auto; background: #fff; }
        .preview-body img, .preview-body iframe { width: 100%; height: 100%; border: none; display: block; }
        .download-btn-inline { padding: 12px 24px; background: #2b7de9; color: white; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; margin: 8px 16px; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-header">
            <span class="title" id="previewTitle">文件预览</span>
            <button class="close-btn" id="closePreview">✕ 关闭</button>
        </div>
        <div class="preview-body" id="previewBody"></div>
        <div class="download-btn-inline" id="downloadInlineBtn">📥 下载文件</div>
    </div>
    <div class="container">
        <div class="card">
            <div class="file-icon">📄</div>
            <div class="file-name" id="fileName">文件名称</div>
            <div class="file-size" id="fileSize">文件大小未知</div>
            <div class="status-tip" id="statusTip">#点击下方按钮下载或预览</div>
            <div class="loading" id="loading"><span class="spinner"></span><span id="loadingText">加载中...</span></div>
            <div class="btn-group">
                <button class="btn btn-primary" id="mainBtn">📥 下载文件</button>
            </div>
        </div>
    </div>
    <script>
        // ✅ 修复1：取出 token
        const urlParams = new URLSearchParams(window.location.search);
        const FILE_URL_PATH = urlParams.get('url') || '';
        const FILE_NAME = urlParams.get('name') || '未知文件';
        const FILE_SIZE = parseInt(urlParams.get('size')) || 0;
        const TOKEN = urlParams.get('token') || '';  // ✅ 取 token

        console.log('文件路径:', FILE_URL_PATH);
        console.log('Token:', TOKEN ? TOKEN.substring(0,10)+'...' : '无');

        // ✅ 修复2：换成 https（如果后端支持）
        const BASE_URL = 'http://192.168.0.34:5101';  // ✅ 改成 https
        const FILE_URL = BASE_URL + FILE_URL_PATH;

        console.log('最终请求URL:', FILE_URL);

        let currentBlobUrl = null;
        let isDownloading = false;

        const $ = (id) => document.getElementById(id);
        const fileNameEl = $('fileName');
        const fileSizeEl = $('fileSize');
        const statusTip = $('statusTip');
        const loading = $('loading');
        const loadingText = $('loadingText');
        const mainBtn = $('mainBtn');
        const toast = $('toast');
        const previewOverlay = $('previewOverlay');
        const previewBody = $('previewBody');
        const previewTitle = $('previewTitle');
        const closePreview = $('closePreview');
        const downloadInlineBtn = $('downloadInlineBtn');

        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            void toast.offsetWidth;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function formatSize(bytes) {
            if (!bytes) return '未知大小';
            const u = ['B','KB','MB','GB'];
            let i = 0;
            while (bytes >= 1024 && i < u.length-1) { bytes /= 1024; i++; }
            return bytes.toFixed(i?1:0) + ' ' + u[i];
        }

        function downloadFile() {
            if (isDownloading || !FILE_URL) return;
            isDownloading = true;
            mainBtn.disabled = true;
            mainBtn.textContent = '⏳ 下载中...';
            loading.classList.add('active');
            loadingText.textContent = '正在下载...';

            fetch(FILE_URL, {
                headers: {
                    'Authorization': `Bearer ${TOKEN}`  // ✅ 用取出来的 token
                }
            })
            .then(res => {
                if (!res.ok) throw new Error('请求失败: ' + res.status);
                return res.blob();
            })
            .then(blob => {
                if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = URL.createObjectURL(blob);
                loading.classList.remove('active');
                showToast('下载完成', 'success');
                openPreview(blob);
            })
            .catch(err => {
                loading.classList.remove('active');
                showToast('下载失败: ' + err.message, 'error');
            });
            isDownloading = false;
            mainBtn.disabled = false;
        }

        function openPreview(blob) {
            const ext = FILE_NAME.split('.').pop().toLowerCase();
            previewTitle.textContent = FILE_NAME;
            previewBody.innerHTML = '';

            if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
                const img = document.createElement('img');
                img.src = currentBlobUrl;
                img.style.cssText = 'width:100%;height:100%;object-fit:contain;';
                previewBody.appendChild(img);
            } else if (ext === 'pdf') {
                const iframe = document.createElement('iframe');
                iframe.src = currentBlobUrl;
                iframe.style.cssText = 'width:100%;height:100%;border:none;';
                previewBody.appendChild(iframe);
            } else {
                previewBody.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:48px;">📄</div>`;
            }
            previewOverlay.classList.add('active');
        }

        function downloadCurrentFile() {
            if (!currentBlobUrl) return;
            const a = document.createElement('a');
            a.href = currentBlobUrl;
            a.download = FILE_NAME;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast('下载已开始', 'success');
        }

        mainBtn.addEventListener('click', downloadFile);
        closePreview.addEventListener('click', () => previewOverlay.classList.remove('active'));
        downloadInlineBtn.addEventListener('click', downloadCurrentFile);

        fileNameEl.textContent = FILE_NAME;
        fileSizeEl.textContent = formatSize(FILE_SIZE);
    </script>
</body>
</html>
