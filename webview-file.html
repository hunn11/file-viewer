<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文件预览</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f5f7fa; 
            padding: 16px; 
            min-height: 100vh; 
            min-height: 100dvh;
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .container { 
            max-width: 420px; 
            width: 100%; 
            margin: 0 auto; 
        }
        
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 32px 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); 
            text-align: center; 
        }
        
        .file-icon { 
            width: 72px; 
            height: 72px; 
            border-radius: 50%; 
            background: #e8f4fd; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 36px; 
            margin: 0 auto 12px; 
        }
        
        .file-name { 
            font-size: 16px; 
            font-weight: 600; 
            color: #1a2332; 
            word-break: break-all; 
            margin-bottom: 6px; 
            line-height: 1.4;
            max-height: 48px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .file-info { 
            font-size: 13px; 
            color: #8c9aa8; 
            margin-bottom: 14px; 
        }
        
        .status-tip { 
            padding: 8px 12px; 
            border-radius: 8px; 
            font-size: 13px; 
            margin-bottom: 14px; 
            background: #f0f2f5; 
            color: #606266; 
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-tip.loading { background: #fff3e0; color: #e6a23c; }
        .status-tip.success { background: #e8f8ee; color: #1aad5f; }
        .status-tip.error { background: #fef0f0; color: #f56c6c; }
        .status-tip.cached { background: #e8f4fd; color: #2b7de9; }
        .status-tip.downloading { background: #fef7e0; color: #e6a23c; }
        .status-tip.h5plus { background: #f0f0e8; color: #8c8c6a; }
        .status-tip.wechat { background: #e8f4fd; color: #07c160; }
        
        .btn { 
            display: inline-block; 
            padding: 14px 24px; 
            border: none; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
            width: 100%;
            max-width: 300px;
            -webkit-touch-callout: none;
        }
        
        .btn:active { 
            transform: scale(0.97); 
        }
        
        .btn-primary { 
            background: #2b7de9; 
            color: white; 
        }
        .btn-primary:active { 
            background: #1a6ad5; 
        }
        .btn-primary:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
            transform: none;
        }
        
        .btn-success { 
            background: #1aad5f; 
            color: white; 
        }
        .btn-success:active { 
            background: #159a52; 
        }
        
        .btn-wechat {
            background: #07c160;
            color: white;
        }
        .btn-wechat:active {
            background: #06ad56;
        }
        
        .btn-group { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 14px; 
        }
        
        .loading { 
            display: none; 
            text-align: center; 
            padding: 10px; 
            color: #8c9aa8; 
            font-size: 13px; 
        }
        .loading.active { display: block; }
        
        .loading .spinner { 
            display: inline-block; 
            width: 18px; 
            height: 18px; 
            border: 2px solid #e0e6ed; 
            border-top-color: #2b7de9; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            vertical-align: middle; 
            margin-right: 8px; 
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        .toast { 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%) translateY(-20px); 
            background: rgba(0,0,0,0.78); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 12px; 
            font-size: 13px; 
            z-index: 9999; 
            opacity: 0; 
            transition: all 0.3s ease; 
            pointer-events: none; 
            max-width: 90%; 
            text-align: center; 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .toast.show { 
            opacity: 1; 
            transform: translateX(-50%) translateY(0); 
        }
        .toast.success { background: rgba(26,173,95,0.92); }
        .toast.error { background: rgba(245,108,108,0.92); }
        .toast.cached { background: rgba(43,125,233,0.92); }
        .toast.downloading { background: rgba(230,162,60,0.92); }
        
        /* 预览弹窗 - 全屏适配 */
        .preview-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            height: 100dvh;
            z-index: 99999; 
            background: #fff; 
            display: none; 
            flex-direction: column; 
        }
        .preview-overlay.active { display: flex; }
        
        .preview-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 16px; 
            padding-top: env(safe-area-inset-top, 12px);
            background: #f8f9fc; 
            border-bottom: 1px solid #e8ecf0; 
            flex-shrink: 0; 
            min-height: 52px;
        }
        .preview-header .title { 
            font-size: 15px; 
            font-weight: 600; 
            color: #1a2332; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
            flex: 1; 
            margin-right: 12px; 
        }
        .preview-header .close-btn { 
            padding: 6px 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 14px; 
            cursor: pointer; 
            background: #e8ecf0; 
            color: #1a2332; 
            flex-shrink: 0;
        }
        .preview-header .close-btn:active { 
            background: #d5dbe3; 
        }
        
        .preview-body { 
            flex: 1; 
            overflow: auto; 
            background: #fff; 
            min-height: 300px; 
            -webkit-overflow-scrolling: touch; 
        }
        .preview-body iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
            min-height: 400px;
        }
        .preview-body .placeholder { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            font-size: 40px; 
            color: #dcdfe6; 
            flex-direction: column; 
            padding: 40px 20px;
        }
        .preview-body .placeholder span { 
            font-size: 15px; 
            color: #909399; 
            margin-top: 10px; 
        }
        
        .progress-bar { 
            width: 100%; 
            height: 4px; 
            background: #e0e6ed; 
            border-radius: 2px; 
            margin: 10px 0 14px; 
            overflow: hidden; 
        }
        .progress-bar .progress { 
            height: 100%; 
            background: #2b7de9; 
            border-radius: 2px; 
            width: 0%; 
            transition: width 0.3s; 
        }
        
        .save-hint { 
            font-size: 12px; 
            color: #8c9aa8; 
            margin-top: 10px; 
            line-height: 1.5;
        }

        /* 微信引导 - 简洁版 */
        .wechat-guide {
            background: #f0faf4;
            border: 1px solid #b7e4c7;
            border-radius: 12px;
            padding: 14px 16px;
            margin-top: 14px;
            display: none;
        }
        .wechat-guide.show { display: block; }
        .wechat-guide .guide-title {
            font-size: 14px;
            font-weight: 600;
            color: #07c160;
            margin-bottom: 6px;
        }
        .wechat-guide .guide-desc {
            font-size: 13px;
            color: #606266;
            line-height: 1.6;
        }
        .wechat-guide .guide-desc strong {
            color: #07c160;
        }
        .wechat-guide .guide-icon {
            font-size: 32px;
            display: block;
            margin: 6px auto 0;
        }

        /* 全屏下载按钮（超大触摸区域） */
        .full-download-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom, 16px));
            background: linear-gradient(transparent, rgba(255,255,255,0.95) 30%);
            z-index: 100;
            display: none;
        }
        .full-download-area.show { display: block; }
        .full-download-area .btn {
            max-width: 100%;
            padding: 16px;
            font-size: 17px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(43,125,233,0.3);
        }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    
    <!-- 预览弹窗 -->
    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-header">
            <span class="title" id="previewTitle">文件预览</span>
            <button class="close-btn" id="closePreview">✕ 关闭</button>
        </div>
        <div class="preview-body" id="previewBody">
            <div class="placeholder">
                📄
                <span>加载中...</span>
            </div>
        </div>
    </div>

    <!-- 全屏下载按钮（移动端底部固定） -->
    <div class="full-download-area" id="fullDownloadArea">
        <button class="btn btn-primary" id="fullDownloadBtn">📥 立即下载</button>
    </div>

    <!-- 主界面 -->
    <div class="container">
        <div class="card">
            <div class="file-icon" id="fileIcon">📄</div>
            <div class="file-name" id="fileName">文件名称</div>
            <div class="file-info" id="fileInfo">准备加载...</div>
            <div class="progress-bar"><div class="progress" id="progressBar"></div></div>
            <div class="status-tip" id="statusTip">⏳ 准备加载...</div>
            <div class="loading" id="loading"><span class="spinner"></span><span id="loadingText">加载中...</span></div>
            
            <div class="btn-group">
                <button class="btn btn-primary" id="loadBtn">📥 加载并预览</button>
            </div>
            <div class="save-hint" id="saveHint">💡 文件将自动保存到手机下载目录</div>
            
            <!-- 微信引导 -->
            <div class="wechat-guide" id="wechatGuide">
                <div class="guide-title">⚠️ 微信内无法直接下载</div>
                <div class="guide-desc">
                    请点击右上角 <strong>「···」</strong> 选择 
                    <strong>「在浏览器中打开」</strong> 即可下载
                </div>
                <span class="guide-icon">👆</span>
            </div>
        </div>
    </div>

    <script>
        // ==================== 检测环境 ====================
        function isH5Plus() {
            return typeof plus !== 'undefined' && plus.downloader;
        }

        function detectDevice() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            if (/android/i.test(ua)) return 'android';
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
            return 'other';
        }

        function isWechat() {
            return navigator.userAgent.toLowerCase().includes('micromessenger');
        }

        function isMiniProgram() {
            return navigator.userAgent.toLowerCase().includes('miniprogram');
        }

        const isH5 = isH5Plus();
        const deviceType = detectDevice();
        const inWechat = isWechat() || isMiniProgram();

        console.log('📱 是否 H5+ 环境:', isH5);
        console.log('📱 设备类型:', deviceType);
        console.log('📱 是否微信环境:', inWechat);

        // ==================== 配置 ====================
        const CONFIG = {
            BASE_URL: 'https://xglwx.siglenlift.cn/testfile',
            CACHE_KEY: 'cached_file_data',
        };

        // ==================== 获取参数 ====================
        const urlParams = new URLSearchParams(window.location.search);
        const FILE_PATH = urlParams.get('url') || '';
        const FILE_NAME = decodeURIComponent(urlParams.get('name') || '未知文件.pdf');
        const TOKEN = urlParams.get('token') || '';

        const FILE_URL = CONFIG.BASE_URL + FILE_PATH;

        // ==================== DOM 引用 ====================
        const $ = (id) => document.getElementById(id);
        const fileIcon = $('fileIcon');
        const fileNameEl = $('fileName');
        const fileInfo = $('fileInfo');
        const statusTip = $('statusTip');
        const loading = $('loading');
        const loadingText = $('loadingText');
        const loadBtn = $('loadBtn');
        const fullDownloadBtn = $('fullDownloadBtn');
        const fullDownloadArea = $('fullDownloadArea');
        const progressBar = $('progressBar');
        const saveHint = $('saveHint');
        const toast = $('toast');
        const previewOverlay = $('previewOverlay');
        const previewBody = $('previewBody');
        const previewTitle = $('previewTitle');
        const closePreview = $('closePreview');
        const wechatGuide = $('wechatGuide');

        // ==================== 状态 ====================
        let currentBlob = null;
        let isLoaded = false;
        let isDownloading = false;

        // ==================== 工具函数 ====================

        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            void toast.offsetWidth;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function setStatus(text, type = 'info') {
            statusTip.textContent = text;
            statusTip.className = 'status-tip ' + type;
        }

        function showLoading(show, text = '加载中...') {
            if (show) {
                loading.classList.add('active');
                loadingText.textContent = text;
            } else {
                loading.classList.remove('active');
            }
        }

        function updateProgress(percent) {
            progressBar.style.width = Math.min(percent, 100) + '%';
        }

        function formatFileSize(bytes) {
            if (!bytes) return '未知大小';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // ==================== 核心下载函数 ====================
        function triggerDownload(url) {
            // 方法1: 直接跳转
            window.location.href = url;
            
            // 方法2: 使用 a 标签 (备用)
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.download = FILE_NAME;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                setTimeout(() => document.body.removeChild(a), 2000);
            }, 300);
            
            // 方法3: iframe (备用)
            setTimeout(() => {
                const iframe = document.createElement('iframe');
                iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
                iframe.src = url;
                document.body.appendChild(iframe);
                setTimeout(() => document.body.removeChild(iframe), 5000);
            }, 600);
        }

        // ==================== H5+ 下载 ====================
        function downloadWithH5Plus(url, fileName) {
            return new Promise((resolve, reject) => {
                try {
                    let picurl = url;
                    if (TOKEN) {
                        const connector = picurl.includes('?') ? '&' : '?';
                        picurl += connector + 'token=' + encodeURIComponent(TOKEN);
                    }

                    let datas = {
                        filename: '_downloads/' + fileName,
                        method: 'GET',
                        timeout: 60000
                    };

                    let dtask = plus.downloader.createDownload(
                        picurl,
                        datas,
                        (d, status) => {
                            if (status == 200) {
                                showToast('下载完成', 'success');
                                let filePath = d.filename;
                                try {
                                    plus.runtime.openFile(filePath, (error) => {
                                        if (error) showToast('打开文件失败', 'error');
                                    });
                                } catch (openErr) {
                                    showToast('打开文件异常', 'error');
                                }
                                resolve({ success: true, filePath: filePath });
                            } else {
                                dtask.clear();
                                reject(new Error('下载失败: ' + status));
                            }
                        }
                    );

                    dtask.addEventListener('statechanged', (task) => {
                        if (task.state === 2) {
                            let progress = 0;
                            if (task.totalSize > 0) {
                                progress = parseInt(task.downloadedSize / task.totalSize * 100);
                            }
                            updateProgress(progress);
                            fileInfo.textContent = `下载中 ${progress}%`;
                        }
                    });

                    dtask.start();
                } catch (err) {
                    reject(err);
                }
            });
        }

        // ==================== 缓存操作 ====================
        async function getCachedBlob() {
            try {
                const cache = await caches.open('file_cache');
                const response = await cache.match(FILE_URL);
                if (response && response.ok) {
                    const blob = await response.blob();
                    if (blob.size > 0) return blob;
                }
                return null;
            } catch { return null; }
        }

        async function saveToCache(blob) {
            try {
                const cache = await caches.open('file_cache');
                const response = new Response(blob);
                await cache.put(FILE_URL, response);
            } catch {}
        }

        // ==================== 预览 ====================
        function openPreview(blob, fileName) {
            previewTitle.textContent = fileName || FILE_NAME;
            previewBody.innerHTML = '';

            const ext = (fileName || FILE_NAME).split('.').pop().toLowerCase();
            
            if (ext === 'pdf') {
                const blobUrl = URL.createObjectURL(blob);
                const iframe = document.createElement('iframe');
                iframe.src = blobUrl;
                iframe.style.cssText = 'width:100%;height:100%;border:none;min-height:400px;';
                previewBody.appendChild(iframe);
                setStatus('✅ 预览成功', 'success');
            } else if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                const blobUrl = URL.createObjectURL(blob);
                const img = document.createElement('img');
                img.src = blobUrl;
                img.style.cssText = 'width:100%;height:100%;object-fit:contain;';
                previewBody.appendChild(img);
            } else {
                previewBody.innerHTML = `
                    <div class="placeholder">
                        📄
                        <span>暂不支持预览 .${ext} 文件</span>
                        <span style="font-size:13px;color:#c0c4cc;margin-top:4px;">请下载查看</span>
                    </div>
                `;
            }
            previewOverlay.classList.add('active');
        }

        // ==================== 主加载逻辑 ====================
        async function autoLoadAndPreview() {
            if (isDownloading) return;
            isDownloading = true;
            loadBtn.disabled = true;

            let downloadUrl = FILE_URL;
            if (TOKEN) {
                const connector = FILE_URL.includes('?') ? '&' : '?';
                downloadUrl += connector + 'token=' + encodeURIComponent(TOKEN);
            }

            // ===== 微信环境：直接跳转下载 =====
            if (inWechat) {
                showToast('📱 正在打开...', 'downloading');
                setStatus('📱 跳转到浏览器...', 'wechat');
                wechatGuide.classList.add('show');
                
                // 尝试多种方式跳转
                window.location.href = downloadUrl;
                setTimeout(() => {
                    window.open(downloadUrl, '_blank');
                }, 300);
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.target = '_blank';
                    a.click();
                }, 600);
                
                showLoading(false);
                isDownloading = false;
                loadBtn.disabled = false;
                return;
            }

            // ===== HBuilder WebView =====
            const isHBuilderWebView = navigator.userAgent.includes('HBuilder') || 
                                      navigator.userAgent.includes('hbuilder');
            if (isHBuilderWebView) {
                try {
                    showToast('📥 正在下载...', 'downloading');
                    window.location.href = downloadUrl;
                    setTimeout(() => {
                        setStatus('✅ 下载已触发', 'success');
                        showLoading(false);
                    }, 1000);
                } catch (err) {
                    showToast('下载失败: ' + err.message, 'error');
                }
                isDownloading = false;
                loadBtn.disabled = false;
                return;
            }
            
            // ===== H5+ 环境 =====
            if (isH5) {
                showLoading(true, '正在下载...');
                setStatus('📱 H5+ 下载中...', 'h5plus');
                showToast('📱 使用 H5+ 下载', 'downloading');
                updateProgress(0);
                try {
                    await downloadWithH5Plus(FILE_URL, FILE_NAME);
                    showLoading(false);
                    setStatus('✅ 下载完成', 'success');
                    showToast('✅ 文件已保存', 'success');
                } catch (err) {
                    console.error('❌ H5+ 下载失败:', err);
                    setStatus('❌ 下载失败: ' + err.message, 'error');
                    showLoading(false);
                    showToast('下载失败: ' + err.message, 'error');
                }
                isDownloading = false;
                loadBtn.disabled = false;
                return;
            }
        
            // ===== 普通浏览器：尝试 fetch，失败则直接跳转 =====
            try {
                // 检查缓存
                const cachedBlob = await getCachedBlob();
                if (cachedBlob) {
                    currentBlob = cachedBlob;
                    isLoaded = true;
                    fileInfo.textContent = formatFileSize(cachedBlob.size) + ' (已缓存)';
                    setStatus('📦 从缓存加载', 'cached');
                    showToast('📦 从缓存加载', 'cached');
                    setTimeout(() => openPreview(cachedBlob, FILE_NAME), 200);
                    isDownloading = false;
                    loadBtn.disabled = false;
                    return;
                }
        
                // 尝试 fetch 下载
                showLoading(true, '正在下载...');
                setStatus('⏳ 正在下载...', 'downloading');
                showToast('📥 正在下载...', 'downloading');
                updateProgress(0);
        
                let response;
                try {
                    response = await fetch(downloadUrl);
                } catch (fetchError) {
                    // 🔥 fetch 失败（CORS），直接跳转下载
                    console.warn('⚠️ fetch 失败，降级到直接下载:', fetchError);
                    showToast('📥 直接下载', 'downloading');
                    triggerDownload(downloadUrl);
                    setStatus('📥 已触发下载', 'success');
                    showLoading(false);
                    isDownloading = false;
                    loadBtn.disabled = false;
                    return;
                }
        
                if (!response.ok) {
                    throw new Error('下载失败: ' + response.status);
                }
        
                // 读取响应流
                const contentLength = response.headers.get('content-length');
                const total = contentLength ? parseInt(contentLength, 10) : 0;
                const reader = response.body.getReader();
                const chunks = [];
                let loaded = 0;
        
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    loaded += value.length;
                    if (total) {
                        updateProgress((loaded / total) * 100);
                        fileInfo.textContent = `下载中 ${Math.round((loaded / total) * 100)}%`;
                    }
                }
        
                const blob = new Blob(chunks);
                updateProgress(100);
                await saveToCache(blob);
                
                currentBlob = blob;
                isLoaded = true;
                fileInfo.textContent = formatFileSize(blob.size) + ' (已下载)';
                setStatus('✅ 下载完成', 'success');
                showLoading(false);
                showToast('📥 下载完成', 'success');
        
                // 保存并预览
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = FILE_NAME;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 1000);
        
                setTimeout(() => openPreview(blob, FILE_NAME), 300);
        
            } catch (err) {
                console.error('❌ 加载失败:', err);
                setStatus('❌ 加载失败: ' + err.message, 'error');
                showLoading(false);
                showToast('加载失败，尝试直接下载', 'error');
                triggerDownload(downloadUrl);
            }
        
            isDownloading = false;
            loadBtn.disabled = false;
        }

        // ==================== 事件绑定 ====================

        loadBtn.addEventListener('click', autoLoadAndPreview);
        fullDownloadBtn.addEventListener('click', autoLoadAndPreview);

        closePreview.addEventListener('click', () => {
            previewOverlay.classList.remove('active');
        });

        previewOverlay.addEventListener('click', (e) => {
            if (e.target === previewOverlay) {
                previewOverlay.classList.remove('active');
            }
        });

        // ==================== 初始化 ====================

        async function init() {
            fileNameEl.textContent = FILE_NAME || '未命名文件';
            fileIcon.textContent = FILE_NAME.toLowerCase().endsWith('.pdf') ? '📄' : '📁';
            
            // 微信环境检测
            if (inWechat) {
                wechatGuide.classList.add('show');
                saveHint.textContent = '⚠️ 微信内无法下载，请用浏览器打开';
                setStatus('⚠️ 微信环境，点击下载跳转', 'wechat');
                fileInfo.textContent = '点击按钮跳转下载';
                // 显示底部大按钮
                fullDownloadArea.classList.add('show');
                fullDownloadBtn.textContent = '📥 点击下载（跳转浏览器）';
                fullDownloadBtn.className = 'btn btn-wechat';
                // 隐藏主按钮
                loadBtn.style.display = 'none';
                const deviceType = detectDevice();
                console.log('📱 设备类型:', deviceType);
            } else if (isH5) {
                saveHint.textContent = '📱 使用 H5+ 下载引擎';
                setStatus('📱 H5+ 环境已就绪', 'h5plus');
                fileInfo.textContent = '点击加载下载';
            } else {
                let deviceName = deviceType === 'android' ? 'Android' : deviceType === 'ios' ? 'iOS' : '';
                saveHint.textContent = `💡 文件将自动保存到 ${deviceName} 下载目录`;
                setStatus('⏳ 点击加载', 'loading');
                
                // 显示底部大按钮
                fullDownloadArea.classList.add('show');
                fullDownloadBtn.textContent = '📥 立即下载';
                fullDownloadBtn.className = 'btn btn-primary';
            }

            console.log(`🚀 初始化完成 (H5+: ${isH5}, 设备: ${deviceType}, 微信: ${inWechat})`);
        }

        init();
    </script>
</body>
</html>
